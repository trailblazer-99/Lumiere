# Azure Pipelines CI/CD Workflow for Lumière Media Player
# Hybrid Azure DevOps - GitHub Integration

trigger:
  branches:
    include:
      - main
      - master
      - dev

pr:
  branches:
    include:
      - main
      - master
      - dev

pool:
  vmImage: 'windows-latest'

variables:
  solution: 'LumiereMediaPlayer.csproj'
  proxyProject: 'LumiereProxy/LumiereProxy.csproj'
  buildConfiguration: 'Release'
  buildPlatform: 'x64'
  ciAppTargetFramework: 'net9.0-windows10.0.19041.0'
  ciProxyTargetFramework: 'net9.0'

steps:
- task: UseDotNet@2
  displayName: 'Install .NET 9.0 SDK for MSBuild 17.x Compatibility'
  inputs:
    packageType: 'sdk'
    version: '9.0.x'
    performMultiLevelLookup: true

- task: PowerShell@2
  displayName: 'Prepare Configuration Files for CI'
  inputs:
    targetType: 'inline'
    script: |
      if (-not (Test-Path "appsettings.json")) {
        Copy-Item "appsettings.json.example" "appsettings.json"
        Write-Host "Created appsettings.json from template."
      }
      if (Test-Path "global.json") {
        Remove-Item "global.json" -Force
        Write-Host "Bypassed global.json SDK lock for Azure Pipelines agent compatibility."
      }

- task: PowerShell@2
  displayName: 'Restore Project Dependencies'
  inputs:
    targetType: 'inline'
    script: |
      dotnet restore LumiereMediaPlayer.csproj -p:Platform=$(buildPlatform) -p:TargetFramework=$(ciAppTargetFramework)
      dotnet restore LumiereProxy/LumiereProxy.csproj -p:TargetFramework=$(ciProxyTargetFramework)

- task: PowerShell@2
  displayName: 'Build WinUI 3 Desktop App ($(buildPlatform) | $(buildConfiguration))'
  inputs:
    targetType: 'inline'
    script: |
      dotnet build LumiereMediaPlayer.csproj -c $(buildConfiguration) -p:Platform=$(buildPlatform) -p:TargetFramework=$(ciAppTargetFramework) -p:GenerateAppxPackageOnBuild=true -p:UapAppxPackageBuildMode=SideLoadOnly -p:AppxBundle=Never

- task: PowerShell@2
  displayName: 'Build Azure Functions Proxy ($(buildConfiguration))'
  inputs:
    targetType: 'inline'
    script: |
      dotnet build LumiereProxy/LumiereProxy.csproj -c $(buildConfiguration) -p:TargetFramework=$(ciProxyTargetFramework)

- task: CopyFiles@2
  displayName: 'Stage Build Artifacts'
  inputs:
    SourceFolder: '$(Build.SourcesDirectory)'
    Contents: |
      bin/$(buildPlatform)/$(buildConfiguration)/**
      LumiereProxy/bin/$(buildConfiguration)/**
    TargetFolder: '$(Build.ArtifactStagingDirectory)'

- task: PublishBuildArtifacts@1
  displayName: 'Publish Pipeline Artifacts'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'LumiereMediaPlayer-Drop'
    publishLocation: 'Container'
