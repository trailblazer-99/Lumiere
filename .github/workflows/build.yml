name: Lumiere Media Player CI/CD

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

permissions:
  contents: write

jobs:
  # Job 1: Build check for Pull Requests and development branch pushes (fast build check)
  verify-build:
    name: Verify Build (x64 Release)
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master')
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v7

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: '10.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: Create Config File from Template
      run: copy appsettings.json.example appsettings.json
      shell: cmd

    - name: Restore NuGet Packages
      run: msbuild LumiereMediaPlayer.csproj -t:restore /p:Platform=x64 /p:Configuration=Release

    - name: Build Verification
      run: |
        msbuild LumiereMediaPlayer.csproj `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:GenerateAppxPackageOnBuild=true `
          /p:AppxPackageDir="${{ github.workspace }}\AppPackages" `
          /p:UapAppxPackageBuildMode=SideLoadOnly `
          /p:AppxBundle=Never
      shell: powershell

  # Job 2: Build, Sign, and Deploy Package to GitHub Pages (runs on push to main or master)
  deploy-release:
    name: Build, Sign, and Deploy to GitHub Pages
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v7

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: '10.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: Create Release Config File
      shell: powershell
      env:
        LUMIERE_PROXY_BASE_URL: ${{ secrets.LUMIERE_PROXY_BASE_URL }}
        LUMIERE_PROXY_APP_TOKEN: ${{ secrets.LUMIERE_PROXY_APP_TOKEN }}
      run: |
        if ([string]::IsNullOrWhiteSpace($env:LUMIERE_PROXY_BASE_URL)) {
          throw "GitHub secret LUMIERE_PROXY_BASE_URL is required for release builds."
        }
        if ([string]::IsNullOrWhiteSpace($env:LUMIERE_PROXY_APP_TOKEN)) {
          throw "GitHub secret LUMIERE_PROXY_APP_TOKEN is required for release builds."
        }

        $config = [ordered]@{
          UseProxy = $true
          ProxyBaseUrl = $env:LUMIERE_PROXY_BASE_URL
          ProxyAppToken = $env:LUMIERE_PROXY_APP_TOKEN
        }
        $json = $config | ConvertTo-Json -Depth 3
        $utf8NoBom = New-Object System.Text.UTF8Encoding $false
        [System.IO.File]::WriteAllText("$PWD\appsettings.json", $json, $utf8NoBom)

    # Dynamically update the version in the manifest and csproj using GITHUB_RUN_NUMBER
    - name: Update Manifest and Project Version
      shell: powershell
      run: |
        $releaseVersion = "1.0.1.$env:GITHUB_RUN_NUMBER"

        [xml]$manifest = Get-Content "Package.appxmanifest" -Encoding utf8
        $manifest.Package.Identity.Version = $releaseVersion
        $manifest.Save("Package.appxmanifest")

        [xml]$csproj = Get-Content "LumiereMediaPlayer.csproj" -Encoding utf8
        $csproj.Project.PropertyGroup[0].Version = $releaseVersion
        $csproj.Project.PropertyGroup[0].ApplicationVersion = $releaseVersion
        $csproj.Project.PropertyGroup[0].ApplicationDisplayVersion = $releaseVersion
        $csproj.Save("LumiereMediaPlayer.csproj")

    # Diagnostic: Print manifest and project versions before compiling
    - name: Diagnostics (Pre-Build)
      shell: powershell
      run: |
        Write-Output "=== Package.appxmanifest ==="
        [xml]$manifest = Get-Content "Package.appxmanifest" -Encoding utf8
        Write-Output "Manifest Identity version: $($manifest.Package.Identity.Version)"
        Write-Output "=== LumiereMediaPlayer.csproj ==="
        [xml]$csproj = Get-Content "LumiereMediaPlayer.csproj" -Encoding utf8
        Write-Output "Proj version: $($csproj.Project.PropertyGroup[0].Version)"
        Write-Output "Proj App version: $($csproj.Project.PropertyGroup[0].ApplicationVersion)"
        Write-Output "Proj App Display version: $($csproj.Project.PropertyGroup[0].ApplicationDisplayVersion)"

    # Build x64 package (run platform restore first, then compile without /restore to keep property overrides)
    - name: Build and Package App (x64)
      run: |
        msbuild LumiereMediaPlayer.csproj -t:restore `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:Version="1.0.1.$env:GITHUB_RUN_NUMBER" `
          /p:ApplicationVersion="1.0.1.$env:GITHUB_RUN_NUMBER" `
          /p:AppxPackageVersion="1.0.1.$env:GITHUB_RUN_NUMBER" `
          /p:ApplicationDisplayVersion="1.0.1.$env:GITHUB_RUN_NUMBER" `
          /p:AppxAutoIncrementPackageRevision=False

        msbuild LumiereMediaPlayer.csproj `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:AppxBundle=Never `
          /p:GenerateAppxPackageOnBuild=true `
          /p:AppxPackageDir="${{ github.workspace }}\AppPackages\x64\" `
          /p:UapAppxPackageBuildMode=SideLoadOnly `
          /p:GenerateAppinstallerFile=false `
          /p:AppxPackageSigningEnabled=false `
          /p:Version="1.0.1.$env:GITHUB_RUN_NUMBER" `
          /p:ApplicationVersion="1.0.1.$env:GITHUB_RUN_NUMBER" `
          /p:AppxPackageVersion="1.0.1.$env:GITHUB_RUN_NUMBER" `
          /p:ApplicationDisplayVersion="1.0.1.$env:GITHUB_RUN_NUMBER" `
          /p:AppxAutoIncrementPackageRevision=False
      shell: powershell

    # Build ARM64 package (run platform restore first, then compile without /restore to keep property overrides)
    - name: Build and Package App (ARM64)
      run: |
        msbuild LumiereMediaPlayer.csproj -t:restore `
          /p:Configuration=Release `
          /p:Platform=ARM64 `
          /p:Version="1.0.1.$env:GITHUB_RUN_NUMBER" `
          /p:ApplicationVersion="1.0.1.$env:GITHUB_RUN_NUMBER" `
          /p:AppxPackageVersion="1.0.1.$env:GITHUB_RUN_NUMBER" `
          /p:ApplicationDisplayVersion="1.0.1.$env:GITHUB_RUN_NUMBER" `
          /p:AppxAutoIncrementPackageRevision=False

        msbuild LumiereMediaPlayer.csproj `
          /p:Configuration=Release `
          /p:Platform=ARM64 `
          /p:AppxBundle=Never `
          /p:GenerateAppxPackageOnBuild=true `
          /p:AppxPackageDir="${{ github.workspace }}\AppPackages\ARM64\" `
          /p:UapAppxPackageBuildMode=SideLoadOnly `
          /p:GenerateAppinstallerFile=false `
          /p:AppxPackageSigningEnabled=false `
          /p:Version="1.0.1.$env:GITHUB_RUN_NUMBER" `
          /p:ApplicationVersion="1.0.1.$env:GITHUB_RUN_NUMBER" `
          /p:AppxPackageVersion="1.0.1.$env:GITHUB_RUN_NUMBER" `
          /p:ApplicationDisplayVersion="1.0.1.$env:GITHUB_RUN_NUMBER" `
          /p:AppxAutoIncrementPackageRevision=False
      shell: powershell

    # Diagnostic: Print compiled package files and inspect their manifests
    - name: Diagnostics (Post-Build)
      shell: powershell
      run: |
        Write-Output "=== List of compiled files ==="
        Get-ChildItem -Path AppPackages\*.msix -Recurse | ForEach-Object {
          Write-Output "File: $($_.FullName) (Size: $($_.Length) bytes)"
        }
        
        Write-Output "=== Unpacking and inspecting x64 package manifest ==="
        $x64Msix = (Get-ChildItem -Path AppPackages\*.msix -Recurse | Where-Object { $_.FullName -like "*_x64.msix" } | Select-Object -ExpandProperty FullName -First 1)
        if ($x64Msix) {
          # Use Expand-Archive (since msix is a zip file under the hood)
          New-Item -ItemType Directory -Force -Path temp_unpack
          Copy-Item $x64Msix temp_unpack\package.zip
          Expand-Archive -Path temp_unpack\package.zip -DestinationPath temp_unpack\extracted
          if (Test-Path temp_unpack\extracted\AppxManifest.xml) {
            [xml]$xml = Get-Content temp_unpack\extracted\AppxManifest.xml -Encoding utf8
            Write-Output "Extracted AppxManifest Package Identity Version: $($xml.Package.Identity.Version)"
          } else {
            Write-Output "AppxManifest.xml not found in unpacked package."
          }
          Remove-Item -Path temp_unpack -Recurse -Force
        } else {
          Write-Output "x64 msix not found."
        }

    # Bundle the individual architecture packages into an MSIXBundle and sign them
    - name: Bundle and Sign Packages
      shell: powershell
      run: |
        # Keep the App Installer metadata tied to the package manifest. The
        # identity is Store-linked, so do not duplicate or rename it here.
        [xml]$sourceManifest = Get-Content "Package.appxmanifest" -Encoding utf8
        $packageIdentityName = [string]$sourceManifest.Package.Identity.Name
        $packagePublisher = [string]$sourceManifest.Package.Identity.Publisher
        $packageVersion = [string]$sourceManifest.Package.Identity.Version
        if ([string]::IsNullOrWhiteSpace($packageIdentityName) -or [string]::IsNullOrWhiteSpace($packagePublisher)) {
          throw "Package.appxmanifest must define Identity Name and Publisher."
        }
        if ($packageVersion -ne "1.0.1.$env:GITHUB_RUN_NUMBER") {
          throw "Package.appxmanifest Identity Version '$packageVersion' does not match expected release version '1.0.1.$env:GITHUB_RUN_NUMBER'."
        }
        Write-Output "Expected package identity: $packageIdentityName"
        Write-Output "Expected package publisher: $packagePublisher"
        Write-Output "Expected package version: $packageVersion"

        # 1. Locate Windows SDK tools (signtool.exe and makeappx.exe)
        $sdkBinPath = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\" -Filter "signtool.exe" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.FullName -like "*x64*" } | Select-Object -ExpandProperty DirectoryName -First 1
        if (-not $sdkBinPath) {
          $sdkBinPath = "C:\Program Files (x86)\Windows Kits\10\App Certification Kit"
        }
        $signtool = Join-Path $sdkBinPath "signtool.exe"
        $makeappx = Join-Path $sdkBinPath "makeappx.exe"
        Write-Output "Found SDK Bin Folder: $sdkBinPath"

        # 2. Stage packages for bundling
        New-Item -ItemType Directory -Force -Path AppPackages\BundleSources
        
        # Find and copy all generated MSIX packages recursively (excluding the target BundleSources directory)
        Get-ChildItem -Path AppPackages\*.msix -Recurse | Where-Object { $_.FullName -notlike "*BundleSources*" } | ForEach-Object {
          Write-Output "Staging Package: $($_.FullName)"
          Copy-Item $_.FullName "AppPackages\BundleSources\"
        }

        # Verify every architecture package before bundling. App Installer
        # requires these values to match exactly.
        Add-Type -AssemblyName System.IO.Compression.FileSystem
        $validatedPackageCount = 0
        Get-ChildItem -Path "AppPackages\BundleSources\*.msix" | ForEach-Object {
          $archive = [System.IO.Compression.ZipFile]::OpenRead($_.FullName)
          try {
            $manifestEntry = $archive.GetEntry("AppxManifest.xml")
            if (-not $manifestEntry) {
              throw "AppxManifest.xml is missing from $($_.Name)."
            }

            $reader = [System.IO.StreamReader]::new($manifestEntry.Open())
            try {
              [xml]$packageManifest = $reader.ReadToEnd()
            } finally {
              $reader.Dispose()
            }

            $actualIdentityName = [string]$packageManifest.Package.Identity.Name
            $actualPublisher = [string]$packageManifest.Package.Identity.Publisher
            $actualVersion = [string]$packageManifest.Package.Identity.Version
            if ($actualIdentityName -ne $packageIdentityName -or $actualPublisher -ne $packagePublisher) {
              throw "Package identity mismatch in $($_.Name): found '$actualIdentityName' / '$actualPublisher', expected '$packageIdentityName' / '$packagePublisher'."
            }
            if ($actualVersion -ne $packageVersion) {
              throw "Package version mismatch in $($_.Name): found '$actualVersion', expected '$packageVersion'."
            }
            $validatedPackageCount++
            Write-Output "Validated package identity and version: $($_.Name)"
          } finally {
            $archive.Dispose()
          }
        }
        if ($validatedPackageCount -eq 0) {
          throw "No MSIX packages were staged for bundling."
        }

        # 3. Create MSIXBundle
        New-Item -ItemType Directory -Force -Path deploy
        $bundleFilename = "LumiereMediaPlayer_1.0.1.$($env:GITHUB_RUN_NUMBER)_x64_arm64.msixbundle"
        Write-Output "Bundling packages to: deploy\$bundleFilename"
        & $makeappx bundle /d "AppPackages\BundleSources" /p "deploy\$bundleFilename" /bv $packageVersion /o

        $bundleArchive = [System.IO.Compression.ZipFile]::OpenRead("$PWD\deploy\$bundleFilename")
        try {
          $bundleManifestEntry = $bundleArchive.GetEntry("AppxMetadata/AppxBundleManifest.xml")
          if (-not $bundleManifestEntry) {
            $bundleManifestEntry = $bundleArchive.GetEntry("AppxBundleManifest.xml")
          }
          if (-not $bundleManifestEntry) {
            throw "AppxBundleManifest.xml is missing from $bundleFilename."
          }

          $reader = [System.IO.StreamReader]::new($bundleManifestEntry.Open())
          try {
            [xml]$bundleManifest = $reader.ReadToEnd()
          } finally {
            $reader.Dispose()
          }

          $bundleIdentityName = [string]$bundleManifest.Bundle.Identity.Name
          $bundlePublisher = [string]$bundleManifest.Bundle.Identity.Publisher
          $bundleVersion = [string]$bundleManifest.Bundle.Identity.Version
          if ($bundleIdentityName -ne $packageIdentityName -or $bundlePublisher -ne $packagePublisher -or $bundleVersion -ne $packageVersion) {
            throw "Bundle identity mismatch: found '$bundleIdentityName' / '$bundlePublisher' / '$bundleVersion', expected '$packageIdentityName' / '$packagePublisher' / '$packageVersion'."
          }
          Write-Output "Validated bundle identity and version: $bundleIdentityName $bundleVersion"
        } finally {
          $bundleArchive.Dispose()
        }

        # 4. Sign the generated bundle
        Write-Output "Signing Bundle..."
        & $signtool sign /fd SHA256 /f "Signing\LumiereMediaPlayer.pfx" /p Lumiere123! "deploy\$bundleFilename"

    # Create a GitHub Release and upload the msixbundle (GitHub Releases allows files > 100MB)
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        files: deploy/*.msixbundle
        tag_name: v1.0.1.${{ github.run_number }}
        name: Lumière Media Player v1.0.1.${{ github.run_number }}
        body: |
          Automated Release of Lumière Media Player.
          
          ### Installation
          Download and run the App Installer or sideload using the `.msixbundle` below.
        draft: false
        prerelease: false
        token: ${{ secrets.GITHUB_TOKEN }}

    # Generate .appinstaller, replace placeholders in index.html, and stage web files
    # We remove the heavy .msixbundle from the deploy folder so it isn't pushed to gh-pages branch
    - name: Prepare Deployment Website
      shell: powershell
      run: |
        # 1. Parse repository path
        $repoParts = $env:GITHUB_REPOSITORY -split "/"
        $owner = $repoParts[0]
        $repoName = $repoParts[1]
        
        $bundleFilename = "LumiereMediaPlayer_1.0.1.$($env:GITHUB_RUN_NUMBER)_x64_arm64.msixbundle"

        Add-Type -AssemblyName System.IO.Compression.FileSystem
        $bundleArchive = [System.IO.Compression.ZipFile]::OpenRead("$PWD\deploy\$bundleFilename")
        try {
          $bundleManifestEntry = $bundleArchive.GetEntry("AppxMetadata/AppxBundleManifest.xml")
          if (-not $bundleManifestEntry) {
            $bundleManifestEntry = $bundleArchive.GetEntry("AppxBundleManifest.xml")
          }
          if (-not $bundleManifestEntry) {
            throw "AppxBundleManifest.xml is missing from $bundleFilename."
          }

          $reader = [System.IO.StreamReader]::new($bundleManifestEntry.Open())
          try {
            [xml]$bundleManifest = $reader.ReadToEnd()
          } finally {
            $reader.Dispose()
          }

          $packageIdentityName = [string]$bundleManifest.Bundle.Identity.Name
          $packagePublisher = [string]$bundleManifest.Bundle.Identity.Publisher
          $packageVersion = [string]$bundleManifest.Bundle.Identity.Version
        } finally {
          $bundleArchive.Dispose()
        }

        if ([string]::IsNullOrWhiteSpace($packageIdentityName) -or [string]::IsNullOrWhiteSpace($packagePublisher) -or [string]::IsNullOrWhiteSpace($packageVersion)) {
          throw "MSIX bundle manifest must define Identity Name, Publisher, and Version."
        }
        
        # 2. Generate dynamic .appinstaller pointing to the GitHub Release asset URL
        $releaseDownloadUrl = "https://github.com/$owner/$repoName/releases/download/v1.0.1.$env:GITHUB_RUN_NUMBER/$bundleFilename"
        
        $xml = '<?xml version="1.0" encoding="utf-8"?>'
        $xml += "`n" + '<AppInstaller Uri="https://' + $owner + '.github.io/' + $repoName + '/LumiereMediaPlayer.appinstaller" Version="' + $packageVersion + '" xmlns="http://schemas.microsoft.com/appx/appinstaller/2021">'
        $xml += "`n" + '  <MainBundle Name="' + $packageIdentityName + '" Version="' + $packageVersion + '" Publisher="' + $packagePublisher + '" Uri="' + $releaseDownloadUrl + '" />'
        $xml += "`n" + '  <UpdateSettings>'
        $xml += "`n" + '    <OnLaunch HoursBetweenUpdateChecks="0" ShowPrompt="false" UpdateBlocksActivation="true" />'
        $xml += "`n" + '  </UpdateSettings>'
        $xml += "`n" + '</AppInstaller>'
        
        # Write without BOM (Out-File -Encoding utf8 adds a BOM which breaks XML parsing)
        $utf8NoBom = New-Object System.Text.UTF8Encoding $false
        [System.IO.File]::WriteAllText("$PWD\deploy\LumiereMediaPlayer.appinstaller", $xml, $utf8NoBom)
        
        # 3. Copy public certificate
        Copy-Item "Signing\LumiereMediaPlayer.cer" "deploy\LumiereMediaPlayer.cer"
        
        # 4. Generate final index.html from template (pointing direct download link to GitHub Release URL)
        $html = Get-Content "Signing\index.html" -Raw -Encoding utf8
        $html = $html -replace "APP_INSTALLER_FILENAME", "LumiereMediaPlayer.appinstaller"
        $html = $html -replace "MSIX_BUNDLE_FILENAME", $releaseDownloadUrl
        $html = $html -replace "APP_VERSION", $packageVersion
        $html | Out-File "deploy\index.html" -Encoding utf8
        
        # 5. Delete the large msixbundle from deploy folder to prevent git commit limit failures
        Remove-Item "deploy\$bundleFilename" -Force

    # Deploy the contents of the deploy/ folder to the gh-pages branch
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./deploy
        publish_branch: gh-pages
