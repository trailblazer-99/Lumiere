name: CI Build

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  build:
    name: Build (${{ matrix.platform }} - ${{ matrix.configuration }})
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [Debug, Release]
        # Match MSBuild casing: 'ARM64' instead of 'arm64'
        platform: [x64, ARM64]

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Create Config File from Template
      run: copy appsettings.json.example appsettings.json
      shell: cmd

    # MSBuild-native package restore to ensure targets resolve correctly for msbuild.exe
    - name: Restore NuGet Packages
      run: msbuild LumiereMediaPlayer.csproj -t:restore /p:Platform=${{ matrix.platform }} /p:Configuration=${{ matrix.configuration }}

    # Build and package using the full MSBuild engine
    - name: Build and Package Project
      run: |
        msbuild LumiereMediaPlayer.csproj `
          /p:Configuration=${{ matrix.configuration }} `
          /p:Platform=${{ matrix.platform }} `
          /p:GenerateAppxPackageOnBuild=true `
          /p:AppxPackageDir="${{ github.workspace }}\AppPackages" `
          /p:UapAppxPackageBuildMode=StoreUpload `
          /p:AppxBundle=Never
      shell: powershell

    # Upload the generated MSIX packages as artifacts
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: LumiereMediaPlayer-Package-${{ matrix.platform }}-${{ matrix.configuration }}
        path: AppPackages/
